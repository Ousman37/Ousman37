<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="50%"  style="stop-color:#FF6C37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nameGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#22D3EE" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#22D3EE" stroke-width="1">
    <line x1="0"    y1="60"  x2="1200" y2="60"/>
    <line x1="0"    y1="120" x2="1200" y2="120"/>
    <line x1="0"    y1="180" x2="1200" y2="180"/>
    <line x1="0"    y1="240" x2="1200" y2="240"/>
    <line x1="200"  y1="0"   x2="200"  y2="300"/>
    <line x1="400"  y1="0"   x2="400"  y2="300"/>
    <line x1="600"  y1="0"   x2="600"  y2="300"/>
    <line x1="800"  y1="0"   x2="800"  y2="300"/>
    <line x1="1000" y1="0"   x2="1000" y2="300"/>
  </g>

  <!-- Right-side decorative rings -->
  <circle cx="1080" cy="150" r="220" fill="none" stroke="#22D3EE" stroke-width="1" opacity="0.05"/>
  <circle cx="1080" cy="150" r="160" fill="none" stroke="#22D3EE" stroke-width="1" opacity="0.06"/>
  <circle cx="1080" cy="150" r="100" fill="none" stroke="#FF6C37" stroke-width="1" opacity="0.09"/>
  <circle cx="1080" cy="150" r="50"  fill="none" stroke="#FF6C37" stroke-width="1" opacity="0.12"/>
  <circle cx="1080" cy="150" r="5"   fill="#FF6C37" opacity="0.7"/>
  <circle cx="1080" cy="50"  r="3"   fill="#22D3EE" opacity="0.5"/>
  <circle cx="980"  cy="220" r="2"   fill="#22D3EE" opacity="0.4"/>
  <circle cx="1150" cy="80"  r="2"   fill="#FF6C37" opacity="0.4"/>

  <!-- Decorative code block (ghost) -->
  <text x="810" y="108" font-family="'Courier New', monospace" font-size="12.5" fill="#22D3EE" opacity="0.2">const developer = {</text>
  <text x="830" y="128" font-family="'Courier New', monospace" font-size="12.5" fill="#94A3B8" opacity="0.2">  name: "Ethmane",</text>
  <text x="830" y="148" font-family="'Courier New', monospace" font-size="12.5" fill="#94A3B8" opacity="0.2">  journey: "Chef → Developer",</text>
  <text x="830" y="168" font-family="'Courier New', monospace" font-size="12.5" fill="#94A3B8" opacity="0.2">  based: "Norway 🇳🇴",</text>
  <text x="830" y="188" font-family="'Courier New', monospace" font-size="12.5" fill="#94A3B8" opacity="0.2">  ships: "in 14 days 🚀",</text>
  <text x="810" y="208" font-family="'Courier New', monospace" font-size="12.5" fill="#22D3EE" opacity="0.2">};</text>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentBar)"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="297" width="1200" height="3" fill="url(#accentBar)"/>

  <!-- Left vertical accent -->
  <rect x="58" y="55" width="3" height="190" fill="#22D3EE" rx="2" opacity="0.65"/>

  <!-- Small dot at top of vertical accent -->
  <circle cx="59.5" cy="52" r="5" fill="#22D3EE" opacity="0.8"/>

  <!-- Name -->
  <text x="88" y="130"
        font-family="'Courier New', Courier, monospace"
        font-size="72"
        font-weight="700"
        fill="url(#nameGlow)"
        letter-spacing="8"
        filter="url(#softGlow)">ETHMANE</text>

  <!-- Title row -->
  <text x="90" y="165"
        font-family="'Courier New', Courier, monospace"
        font-size="17"
        fill="#22D3EE"
        letter-spacing="3.5"
        opacity="0.95">FRONTEND DEVELOPER  ·  BOLD LAYER FOUNDER</text>

  <!-- Horizontal divider -->
  <line x1="90" y1="182" x2="700" y2="182" stroke="#FF6C37" stroke-width="1.5" opacity="0.55"/>

  <!-- Tech pills row -->
  <!-- React -->
  <rect x="90"  y="195" width="72"  height="23" rx="4" fill="#22D3EE" fill-opacity="0.1" stroke="#22D3EE" stroke-width="0.8" stroke-opacity="0.45"/>
  <text x="126" y="211" font-family="'Courier New', monospace" font-size="11" fill="#22D3EE" text-anchor="middle">React</text>

  <!-- Next.js -->
  <rect x="170" y="195" width="72"  height="23" rx="4" fill="#22D3EE" fill-opacity="0.1" stroke="#22D3EE" stroke-width="0.8" stroke-opacity="0.45"/>
  <text x="206" y="211" font-family="'Courier New', monospace" font-size="11" fill="#22D3EE" text-anchor="middle">Next.js</text>

  <!-- TypeScript -->
  <rect x="250" y="195" width="90"  height="23" rx="4" fill="#22D3EE" fill-opacity="0.1" stroke="#22D3EE" stroke-width="0.8" stroke-opacity="0.45"/>
  <text x="295" y="211" font-family="'Courier New', monospace" font-size="11" fill="#22D3EE" text-anchor="middle">TypeScript</text>

  <!-- Tailwind -->
  <rect x="348" y="195" width="80"  height="23" rx="4" fill="#22D3EE" fill-opacity="0.1" stroke="#22D3EE" stroke-width="0.8" stroke-opacity="0.45"/>
  <text x="388" y="211" font-family="'Courier New', monospace" font-size="11" fill="#22D3EE" text-anchor="middle">Tailwind</text>

  <!-- Node.js -->
  <rect x="436" y="195" width="72"  height="23" rx="4" fill="#FF6C37" fill-opacity="0.1" stroke="#FF6C37" stroke-width="0.8" stroke-opacity="0.45"/>
  <text x="472" y="211" font-family="'Courier New', monospace" font-size="11" fill="#FF6C37" text-anchor="middle">Node.js</text>

  <!-- Footer line -->
  <text x="90" y="253"
        font-family="'Courier New', Courier, monospace"
        font-size="13"
        fill="#64748B"
        letter-spacing="1">📍 Norway  ·  🌐 bold-layer.com  ·  ⚡ High-performance websites in 14 days</text>
</svg>
